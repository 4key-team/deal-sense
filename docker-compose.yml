services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.anthropic.com}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-5}
      - DEAL_SENSE_API_KEY=${DEAL_SENSE_API_KEY:-}
      - LLM_SOCKS5_PROXY=${LLM_SOCKS5_PROXY:-}
      - BOT_CONFIG_PATH=/data/bot-config/bot-config.json
    volumes:
      - bot-config-data:/data/bot-config
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DEAL_SENSE_API_KEY: ${DEAL_SENSE_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWLIST_USER_IDS=${ALLOWLIST_USER_IDS}
      - API_BASE_URL=http://backend:8080
      - DEAL_SENSE_API_KEY=${DEAL_SENSE_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TELEGRAM_PROFILE_STORE_PATH=/data/telegram-profiles.json
      - METRICS_PORT=${TELEGRAM_METRICS_PORT:-9091}
      - BOT_CONFIG_PATH=/data/bot-config/bot-config.json
    volumes:
      - telegram-bot-data:/data
      - bot-config-data:/data/bot-config
    ports:
      - "127.0.0.1:${TELEGRAM_METRICS_PORT:-9091}:${TELEGRAM_METRICS_PORT:-9091}"
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - telegram

volumes:
  telegram-bot-data:
  bot-config-data:
